name: book_application
description: A book application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.2
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/logo.png
    - assets/sounds/intro.mp3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/AfricanElephant.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/AfricanElephant.png"
  min_sdk_android: 21